<nav class="navbar">
  <div class="navbar-brand">
    <span class="navbar-logo">🅿️</span>
    <span class="navbar-title">QuindiParking</span>
  </div>

  <div class="navbar-actions">
    <button class="btn btn--outline btn--sm" (click)="toggleAccessibility()" aria-label="Panel de accesibilidad" title="Accesibilidad">
      ♿ Accesibilidad
    </button>

    @if (user) {
      <span class="navbar-user">{{ user.firstName }} {{ user.lastName }}</span>
    }

    <button class="btn btn--outline btn--sm" (click)="logout()" aria-label="Cerrar sesión">
      Salir
    </button>
  </div>
</nav>

@if (showAccessibility) {
  <qp-accessibility-panel (closed)="showAccessibility = false"></qp-accessibility-panel>
}
