<aside class="sidebar" [class.sidebar--collapsed]="collapsed">
  <button class="sidebar-toggle" (click)="toggle()" [attr.aria-label]="collapsed ? 'Expandir menú' : 'Colapsar menú'">
    {{ collapsed ? '▶' : '◀' }}
  </button>

  <nav class="sidebar-nav">
    @for (item of filteredNavItems; track item.route) {
      <a class="sidebar-link" [routerLink]="item.route" [class.active]="isActive(item.route)" [attr.aria-label]="item.label">
        <span class="sidebar-icon">{{ item.icon }}</span>
        @if (!collapsed) {
          <span class="sidebar-label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>
</aside>
