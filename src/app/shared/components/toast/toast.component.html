<div class="toast-container" aria-live="polite">
  @for (toast of toasts; track toast.id) {
    <div class="toast toast--{{ toast.type }} slide-up" role="alert">
      <span class="toast-icon">
        @switch (toast.type) {
          @case ('success') { ✓ }
          @case ('error') { ✕ }
          @case ('warning') { ⚠ }
          @case ('info') { ℹ }
        }
      </span>
      <span class="toast-message">{{ toast.message }}</span>
      <button class="toast-close" (click)="remove(toast.id)" aria-label="Cerrar notificación">✕</button>
    </div>
  }
</div>
