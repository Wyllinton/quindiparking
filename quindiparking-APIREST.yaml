components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: usuario@ejemplo.com
        password:
          type: string
          minLength: 6
          maxLength: 100
          example: "password123"
      required:
        - email
        - password
    AuthResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: usuario@ejemplo.com
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pérez
        role:
          type: string
          example: USER
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
    RegisterRequest:
      type: object
      properties:
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pérez
        email:
          type: string
          format: email
          example: juan@ejemplo.com
        password:
          type: string
          minLength: 8
          maxLength: 100
          example: "Password123!"
        phoneNumber:
          type: string
          pattern: "^[0-9+\\- ]{7,15}$"
          example: "+57 300 123 4567"
      required:
        - firstName
        - lastName
        - email
        - password
        - phoneNumber
    UserDTO:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pérez
        email:
          type: string
          format: email
          example: juan@ejemplo.com
        phoneNumber:
          type: string
          pattern: "^[0-9+\\- ]{7,15}$"
          example: "+57 300 123 4567"
        role:
          type: string
          example: USER
        isActive:
          type: boolean
          example: true
      required:
        - id
        - firstName
        - lastName
        - email
        - phoneNumber
        - role
        - isActive
    CreateUserDTO:
      type: object
      properties:
        firstName:
          type: string
          example: Ana
        lastName:
          type: string
          example: Gómez
        email:
          type: string
          format: email
          example: ana@ejemplo.com
        password:
          type: string
          minLength: 8
          maxLength: 100
          example: "SecurePass123!"
        phoneNumber:
          type: string
          pattern: "^[0-9+\\- ]{7,15}$"
          example: "+57 311 555 1234"
        role:
          type: string
          example: OPERATOR
      required:
        - firstName
        - lastName
        - email
        - password
        - phoneNumber
        - role
    PasswordChangeRequest:
      type: object
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 100
          example: "OldPass123!"
        newPassword:
          type: string
          minLength: 8
          maxLength: 100
          pattern: "^(?=.*[A-Z])(?=.*[a-z])(?=.*\\d)(?=.*[@$!%*?&]).+$"
          description: Debe contener al menos una mayúscula, una minúscula, un número y un carácter especial
          example: "NewPass456!"
        confirmPassword:
          type: string
          minLength: 8
          maxLength: 100
          example: "NewPass456!"
      required:
        - currentPassword
        - newPassword
        - confirmPassword
    UpdateUserActiveStatusDTO:
      type: object
      properties:
        isActive:
          type: boolean
          example: true
      required:
        - isActive
    VehicleDTO:
      type: object
      properties:
        id:
          type: integer
          example: 10
        userId:
          type: integer
          example: 5
        licensePlate:
          type: string
          pattern: "^[A-Z0-9-]{5,10}$"
          example: "ABC-123"
        vehicleType:
          type: string
          example: "CAR"
        brand:
          type: string
          example: "Toyota"
        color:
          type: string
          example: "Rojo"
      required:
        - id
        - userId
        - licensePlate
        - vehicleType
        - brand
        - color
    ParkingSpaceDTO:
      type: object
      properties:
        id:
          type: integer
          example: 1
        spaceNumber:
          type: string
          example: "A-12"
        vehicleTypeAllowed:
          type: string
          example: "CAR"
        status:
          type: string
          example: "AVAILABLE"
        locationDescription:
          type: string
          example: "Primer piso, ala norte"
      required:
        - id
        - spaceNumber
        - vehicleTypeAllowed
        - status
        - locationDescription
    UpdateParkingSpaceStatusDTO:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/ParkingSpaceStatus'
      required:
        - status
    CheckInRequestDTO:
