openapi: 3.0.1
info:
  title: QuindiParking API
  description: API para la gestión de parqueadero con membresías, servicios de detailing, facturación y pagos.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo
  - url: https://api.quindiparking.com/v1
    description: Servidor de producción
tags:
  - name: Authentication
    description: Endpoints para autenticación, registro y gestión de sesión
  - name: Users
    description: Endpoints para gestión de usuarios
  - name: Vehicles
    description: Endpoints para gestión de vehículos
  - name: Parking Spaces
    description: Endpoints para gestión de espacios de parqueadero
  - name: Parking Sessions
    description: Endpoints para gestión de sesiones de parqueo
  - name: Detailing Services
    description: Endpoints para gestión de servicios de detailing (catálogo)
  - name: Service Orders
    description: Endpoints para gestión de órdenes de servicio (detailing)
  - name: Memberships
    description: Endpoints para gestión de membresías de usuarios
  - name: Membership Plans
    description: Endpoints para gestión de planes de membresía
  - name: Invoices
    description: Endpoints para gestión de facturas
  - name: Payments
    description: Endpoints para procesamiento y gestión de pagos
  - name: Admin Dashboard
    description: Endpoints para dashboard administrativo y estadísticas
paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login
      description: Autentica un usuario con email y contraseña, retorna información del usuario y un token JWT.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Registrar usuario
      description: Registra un nuevo usuario con rol USER por defecto.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email ya registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/me:
    get:
      tags:
        - Authentication
      summary: Obtener usuario actual
      description: Retorna el perfil del usuario autenticado.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil de usuario obtenido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Cerrar sesión
      description: Cierra la sesión del usuario actual (limpia el contexto de seguridad).
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sesión cerrada exitosamente
          content:
            text/plain:
              schema:
                type: string
                example: "Session closed successfully"
  /users:
    post:
      tags:
        - Users
      summary: Crear usuario
      description: Crea un nuevo usuario (solo ADMIN).
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDTO'
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email ya registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Users
      summary: Obtener todos los usuarios
      description: Lista todos los usuarios del sistema (solo ADMIN).
      operationId: getAllUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuarios recuperados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserDTO'
  /users/{id}:
    get:
      tags:
        - Users
      summary: Obtener usuario por ID
      description: Retorna un usuario por su identificador. ADMIN puede ver cualquier usuario; USER solo su propio perfil.
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Users
      summary: Actualizar usuario
      description: Actualiza los datos de un usuario. ADMIN puede actualizar cualquier usuario; USER solo su propio perfil.
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDTO'
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email ya registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Eliminar usuario
      description: Elimina un usuario del sistema (solo ADMIN).
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Usuario eliminado exitosamente
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/me/profile:
    get:
      tags:
        - Users
      summary: Obtener mi perfil
      description: Retorna el perfil del usuario autenticado (equivalente a /auth/me).
      operationId: getMyProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil recuperado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '401':
          description: No autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}/change-password:
    post:
      tags:
        - Users
      summary: Cambiar contraseña
      description: Cambia la contraseña de un usuario. ADMIN puede cambiar cualquier contraseña; USER solo la propia. Valida la contraseña actual.
      operationId: changePassword
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChangeRequest'
      responses:
        '204':
          description: Contraseña cambiada exitosamente
        '400':
          description: Datos inválidos o contraseñas no coinciden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Contraseña actual incorrecta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}/activate:
    patch:
      tags:
        - Users
      summary: Activar/desactivar usuario
      description: Cambia el estado activo de un usuario (solo ADMIN).
      operationId: activateUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserActiveStatusDTO'
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /vehicles:
    post:
      tags:
        - Vehicles
      summary: Crear vehículo
      description: Crea un nuevo vehículo. Cualquier usuario autenticado puede crear vehículos (se asocia al usuario autenticado).
      operationId: createVehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleDTO'
      responses:
        '201':
          description: Vehículo creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDTO'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Propietario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Placa ya registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Vehicles
      summary: Obtener todos los vehículos
      description: Lista todos los vehículos del sistema (solo ADMIN).
      operationId: getAllVehicles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vehículos recuperados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VehicleDTO'
  /vehicles/{id}:
    get:
      tags:
        - Vehicles
      summary: Obtener vehículo por ID
      description: Retorna un vehículo por su identificador. ADMIN puede ver cualquier vehículo; USER solo los suyos.
      operationId: getVehicleById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Vehículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDTO'
        '404':
          description: Vehículo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Vehicles
      summary: Actualizar vehículo
      description: Actualiza los datos de un vehículo. ADMIN puede actualizar cualquier vehículo; USER solo los suyos.
      operationId: updateVehicle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleDTO'
      responses:
        '200':
          description: Vehículo actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDTO'
        '400':
          description: Datos de solicitud inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Vehículo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Placa ya registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Vehicles
      summary: Eliminar vehículo
      description: Elimina un vehículo del sistema. ADMIN puede eliminar cualquier vehículo; USER solo los suyos.
      operationId: deleteVehicle
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Vehículo eliminado exitosamente
        '404':
          description: Vehículo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /vehicles/license-plate/{licensePlate}:
    get:
      tags:
        - Vehicles
      summary: Obtener vehículo por placa
      description: Busca un vehículo por su placa (solo ADMIN).
      operationId: getVehicleByLicensePlate
      security:
        - bearerAuth: []
      parameters:
        - name: licensePlate
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vehículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleDTO'
        '404':
          description: Vehículo no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /vehicles/user/{userId}:
    get:
      tags:
        - Vehicles
      summary: Obtener vehículos por usuario
      description: Lista los vehículos de un usuario específico. ADMIN puede ver de cualquier usuario; USER solo los suyos.
      operationId: getVehiclesByUserId
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Vehículos recuperados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VehicleDTO'
  /vehicles/type/{vehicleType}:
    get:
      tags:
        - Vehicles
      summary: Obtener vehículos por tipo
      description: Lista los vehículos de un tipo específico (ADMIN y OPERATOR).
      operationId: getVehiclesByType
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/VehicleType'
      responses:
        '200':
          description: Vehículos recuperados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VehicleDTO'
        '400':
          description: Tipo de vehículo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /vehicles/check-plate/{licensePlate}:
    get:
      tags:
        - Vehicles
      summary: Verificar si placa existe
      description: Verifica si una placa ya está registrada (solo ADMIN).
      operationId: existsByLicensePlate
      security:
        - bearerAuth: []
      parameters:
        - name: licensePlate
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verificación completada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistsDTO'
  /parking-spaces:
    post:
      tags:
        - Parking Spaces
      summary: Crear espacio de parqueadero
      description: Crea un nuevo espacio de parqueadero (solo ADMIN).
      operationId: createParkingSpace
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkingSpaceDTO'
      responses:
        '201':
          description: Espacio creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpaceDTO'
        '400':
          description: Datos inválidos o número de espacio ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
        - Parking Spaces
      summary: Obtener todos los espacios
      description: Lista todos los espacios de parqueadero, opcionalmente filtrados por estado.
      operationId: getAllParkingSpaces
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ParkingSpaceStatus'
      responses:
        '200':
          description: Espacios recuperados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSpaceDTO'
        '400':
          description: Valor de estado inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /parking-spaces/{id}:
    get:
      tags:
        - Parking Spaces
      summary: Obtener espacio por ID
      description: Retorna un espacio de parqueadero por su identificador.
      operationId: getParkingSpaceById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Espacio encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpaceDTO'
        '404':
          description: Espacio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Parking Spaces
      summary: Actualizar espacio
      description: Actualiza un espacio de parqueadero (solo ADMIN).
      operationId: updateParkingSpace
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkingSpaceDTO'
      responses:
        '200':
          description: Espacio actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpaceDTO'
        '400':
          description: Datos inválidos o número de espacio ya existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Espacio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Parking Spaces
      summary: Eliminar espacio
      description: Elimina un espacio de parqueadero (solo ADMIN).
      operationId: deleteParkingSpace
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Espacio eliminado exitosamente
        '404':
          description: Espacio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /parking-spaces/number/{spaceNumber}:
    get:
      tags:
        - Parking Spaces
      summary: Obtener espacio por número
      description: Retorna un espacio por su número.
      operationId: getParkingSpaceByNumber
      security:
        - bearerAuth: []
      parameters:
        - name: spaceNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Espacio encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpaceDTO'
        '404':
          description: Espacio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /parking-spaces/available/{vehicleType}:
    get:
      tags:
        - Parking Spaces
      summary: Obtener espacios disponibles por tipo de vehículo
      description: Lista los espacios disponibles para un tipo de vehículo específico.
      operationId: getAvailableSpacesByVehicleType
      security:
        - bearerAuth: []
      parameters:
        - name: vehicleType
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/VehicleType'
      responses:
        '200':
          description: Espacios recuperados exitosamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParkingSpaceDTO'
        '400':
          description: Tipo de vehículo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /parking-spaces/{id}/status:
    patch:
      tags:
        - Parking Spaces
      summary: Actualizar estado del espacio
      description: Cambia el estado de un espacio de parqueadero (ADMIN y OPERATOR).
      operationId: updateSpaceStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParkingSpaceStatusDTO'
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingSpaceDTO'
        '400':
          description: Valor de estado inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Espacio no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /parking-spaces/stats/available:
    get:
      tags:
        - Parking Spaces
      summary: Contar espacios disponibles
      description: Obtiene el número total de espacios disponibles.
      operationId: countAvailableSpaces
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conteo recuperado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountDTO'
  /parking-spaces/stats/occupied:
    get:
      tags:
        - Parking Spaces
      summary: Contar espacios ocupados
      description: Obtiene el número total de espacios ocupados.
      operationId: countOccupiedSpaces
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conteo recuperado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountDTO'
  /parking-sessions:
    post:
      tags:
        - Parking Sessions
      summary: Crear sesión de parqueo manualmente
      description: Crea una sesión de parqueo manualmente (solo ADMIN).
      operationId: createParkingSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
